name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - run: npm run validate
      - run: npm run build
      - name: build/ 成果物の鮮度チェック（正本を変えて rebuild 忘れると落ちる）
        run: git diff --exit-code build/
